<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <!-- Bootstrap 5 CSS (CDN) -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Highlight.js for SQL syntax highlighting -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 0.03em; }
    .risk-safe     { color: #198754; }
    .risk-low      { color: #0dcaf0; }
    .risk-medium   { color: #ffc107; }
    .risk-high     { color: #fd7e14; }
    .risk-critical { color: #dc3545; }
    pre code.hljs  { border-radius: 0.375rem; font-size: 0.85rem; }
    .script-card   { transition: box-shadow .15s ease-in-out; }
    .script-card:hover { box-shadow: 0 .5rem 1rem rgba(0,0,0,.15) !important; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="bi bi-database-fill-gear me-2"></i>{{ app_name }}
      </a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/"><i class="bi bi-magic me-1"></i>Generate</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/scripts"><i class="bi bi-files me-1"></i>Scripts</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/docs" target="_blank"><i class="bi bi-code-slash me-1"></i>API Docs</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmC/O1Y7BgL3OiDAKJBiZJnOE4l2"
          crossorigin="anonymous"></script>
  <!-- Highlight.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
  <script>hljs.highlightAll();</script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
